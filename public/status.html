<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Booking Status — CabGo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar"></nav>
<main class="page">
  <h1 class="page-title">Ride <span>Status</span></h1>
  <p class="page-sub">Track and update the status of your booking.</p>
  <div id="alert" class="alert"></div>
  <div class="card">
    <div class="card-title">🔍 Lookup Booking</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Booking ID</label>
        <input type="number" id="booking_id" placeholder="Enter booking ID">
      </div>
    </div>
    <button class="btn btn-primary" style="margin-top:1rem" onclick="fetchBooking()">Fetch Details</button>
  </div>
  <div id="bookingCard" class="card" style="display:none;">
    <div class="card-title">📋 Booking Details</div>
    <div class="steps" id="stepsBar"></div>
    <div id="detailRows"></div>
    <div class="divider"></div>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap;" id="actionBtns"></div>
  </div>
</main>
<script src="js/auth.js"></script>
<script src="js/status.js"></script>
<script>
  requireLogin();
  renderNavbar('status.html');
</script>
</body>
</html>
