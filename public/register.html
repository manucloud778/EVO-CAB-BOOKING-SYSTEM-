<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register — CabGo</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrap {
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:2rem 1rem;
    }
    .auth-box {
      width:100%; max-width:520px;
      background:var(--bg2);
      border:1px solid var(--border);
      border-radius:16px;
      padding:2.5rem;
      box-shadow:var(--shadow);
    }
    .auth-logo {
      font-family:'Syne',sans-serif;
      font-size:1.8rem; font-weight:800;
      color:var(--yellow);
      margin-bottom:.25rem;
    }
    .auth-logo span { color:var(--text); }
    .auth-sub { color:var(--muted); font-size:.875rem; margin-bottom:2rem; }
    .auth-title { font-family:'Syne',sans-serif; font-size:1.35rem; font-weight:700; margin-bottom:.15rem; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:.875rem; color:var(--muted); }
    .auth-footer a { color:var(--yellow); }
    .pw-wrap { position:relative; }
    .pw-toggle {
      position:absolute; right:.8rem; top:50%; transform:translateY(-50%);
      cursor:pointer; color:var(--muted); font-size:.85rem; user-select:none;
    }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">🚕 <span>Cab</span>Go</div>
    <p class="auth-sub">Schedule rides. No live tracking needed.</p>

    <div class="auth-title">Create Account</div>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.5rem;">Fill in your details to get started.</p>

    <div id="alert" class="alert"></div>

    <div class="form-grid" style="margin-bottom:1rem;">
      <div class="form-group">
        <label>First Name *</label>
        <input type="text" id="first_name" placeholder="Riya">
      </div>
      <div class="form-group">
        <label>Middle Name</label>
        <input type="text" id="middle_name" placeholder="Optional">
      </div>
      <div class="form-group">
        <label>Last Name *</label>
        <input type="text" id="last_name" placeholder="Sharma">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="10-digit number" maxlength="10">
      </div>
      <div class="form-group">
        <label>Password *</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Min 6 characters">
          <span class="pw-toggle" onclick="togglePw('password',this)">Show</span>
        </div>
      </div>
      <div class="form-group">
        <label>City *</label>
        <input type="text" id="city" placeholder="Delhi">
      </div>
      <div class="form-group">
        <label>State *</label>
        <input type="text" id="state" placeholder="Delhi">
      </div>
      <div class="form-group">
        <label>Pincode *</label>
        <input type="text" id="pincode" placeholder="110001" maxlength="6">
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%" id="regBtn" onclick="register()">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) window.location.href = 'index.html';

  async function register() {
    const btn = document.getElementById('regBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating…';

    const body = {
      first_name : v('first_name'),
      middle_name: v('middle_name') || undefined,
      last_name  : v('last_name'),
      email      : v('email'),
      password   : v('password'),
      city       : v('city'),
      state      : v('state'),
      pincode    : v('pincode'),
      phones     : v('phone') ? [v('phone')] : [],
    };

    if (!body.first_name||!body.last_name||!body.email||!body.password||!body.city||!body.state||!body.pincode) {
      btn.disabled=false; btn.innerHTML='Create Account';
      return showAlert('error','Please fill all required fields.');
    }

    try {
      const res  = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);

      Auth.saveCustomer(json.data);
      showAlert('success', `Welcome, ${json.data.name}! Redirecting…`);
      setTimeout(() => window.location.href = 'index.html', 1200);
    } catch (e) {
      btn.disabled=false; btn.innerHTML='Create Account';
      showAlert('error', e.message);
    }
  }

  function v(id) { return document.getElementById(id)?.value?.trim()||''; }

  function togglePw(id, el) {
    const inp = document.getElementById(id);
    if (inp.type==='password') { inp.type='text';     el.textContent='Hide'; }
    else                       { inp.type='password'; el.textContent='Show'; }
  }

  function showAlert(type, msg) {
    const el = document.getElementById('alert');
    el.className = `alert alert-${type==='error'?'error':'success'} show`;
    el.textContent = msg;
  }
</script>
</body>
</html>
