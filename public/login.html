<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — CabGo</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrap {
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:2rem 1rem;
    }
    .auth-box {
      width:100%; max-width:420px;
      background:var(--bg2);
      border:1px solid var(--border);
      border-radius:16px;
      padding:2.5rem;
      box-shadow:var(--shadow);
    }
    .auth-logo {
      font-family:'Syne',sans-serif;
      font-size:1.8rem; font-weight:800;
      color:var(--yellow);
      margin-bottom:.25rem;
    }
    .auth-logo span { color:var(--text); }
    .auth-sub { color:var(--muted); font-size:.875rem; margin-bottom:2rem; }
    .auth-title { font-family:'Syne',sans-serif; font-size:1.35rem; font-weight:700; margin-bottom:.15rem; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:.875rem; color:var(--muted); }
    .auth-footer a { color:var(--yellow); }
    .divider-text {
      display:flex; align-items:center; gap:.75rem;
      color:var(--muted); font-size:.78rem; margin:1.25rem 0;
    }
    .divider-text::before,.divider-text::after { content:''; flex:1; height:1px; background:var(--border); }
    .pw-wrap { position:relative; }
    .pw-toggle {
      position:absolute; right:.8rem; top:50%; transform:translateY(-50%);
      cursor:pointer; color:var(--muted); font-size:.85rem; user-select:none;
    }
    .demo-box {
      background:var(--bg3);
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      padding:.85rem 1rem;
      font-size:.8rem; color:var(--muted);
      margin-bottom:1.25rem;
    }
    .demo-box strong { color:var(--text); }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">🚕 <span>Cab</span>Go</div>
    <p class="auth-sub">Schedule rides. No live tracking needed.</p>

    <div class="auth-title">Welcome back</div>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.5rem;">Sign in to your account.</p>

    <div class="demo-box">
      📋 <strong>Demo accounts:</strong><br>
      riya@example.com · arjun@example.com · sneha@example.com<br>
      Password for all: <strong>password123</strong>
    </div>

    <div id="alert" class="alert"></div>

    <div class="form-grid" style="grid-template-columns:1fr;margin-bottom:1rem;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <span class="pw-toggle" onclick="togglePw()">Show</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%" id="loginBtn" onclick="login()">Sign In</button>

    <div class="divider-text">or</div>
    <a href="admin-login.html" class="btn btn-outline" style="width:100%;text-align:center;">🔐 Admin Login</a>

    <div class="auth-footer">
      No account yet? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'index.html';

  // Allow Enter key
  document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

  async function login() {
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      btn.disabled=false; btn.innerHTML='Sign In';
      return showAlert('error','Enter your email and password.');
    }

    try {
      const res  = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);

      Auth.saveCustomer(json.data);
      showAlert('success', `Welcome back, ${json.data.name}!`);
      setTimeout(() => {
        const next = new URLSearchParams(location.search).get('next') || 'index.html';
        window.location.href = next;
      }, 900);
    } catch (e) {
      btn.disabled=false; btn.innerHTML='Sign In';
      showAlert('error', e.message);
    }
  }

  function togglePw() {
    const inp = document.getElementById('password');
    const el  = document.querySelector('.pw-toggle');
    if (inp.type==='password') { inp.type='text'; el.textContent='Hide'; }
    else { inp.type='password'; el.textContent='Show'; }
  }

  function showAlert(type, msg) {
    const el = document.getElementById('alert');
    el.className = `alert alert-${type==='error'?'error':'success'} show`;
    el.textContent = msg;
  }
</script>
</body>
</html>
