<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login — CabGo</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background:#0a0a0c; }
    .auth-wrap {
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:2rem 1rem;
    }
    .auth-box {
      width:100%; max-width:400px;
      background:var(--bg2);
      border:1px solid var(--border);
      border-radius:16px;
      padding:2.5rem;
      box-shadow:0 8px 60px rgba(0,0,0,.7);
    }
    .shield {
      width:56px; height:56px;
      background:rgba(245,197,24,.1);
      border:2px solid rgba(245,197,24,.3);
      border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.6rem;
      margin-bottom:1.25rem;
    }
    .auth-title { font-family:'Syne',sans-serif; font-size:1.35rem; font-weight:700; margin-bottom:.4rem; }
    .auth-sub   { color:var(--muted); font-size:.85rem; margin-bottom:2rem; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:.875rem; color:var(--muted); }
    .auth-footer a { color:var(--yellow); }
    .pw-wrap { position:relative; }
    .pw-toggle {
      position:absolute; right:.8rem; top:50%; transform:translateY(-50%);
      cursor:pointer; color:var(--muted); font-size:.85rem; user-select:none;
    }
    .demo-box {
      background:var(--bg3); border:1px solid var(--border);
      border-radius:var(--radius-sm); padding:.85rem 1rem;
      font-size:.8rem; color:var(--muted); margin-bottom:1.25rem;
    }
    .demo-box strong { color:var(--text); }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="shield">🔐</div>
    <div class="auth-title">Admin Portal</div>
    <p class="auth-sub">Restricted area. Admin credentials required.</p>

    <div class="demo-box">
      🔑 Username: <strong>admin</strong> &nbsp; Password: <strong>admin123</strong>
    </div>

    <div id="alert" class="alert"></div>

    <div class="form-grid" style="grid-template-columns:1fr;margin-bottom:1rem;">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••">
          <span class="pw-toggle" onclick="togglePw()">Show</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%" id="loginBtn" onclick="adminLogin()">Access Dashboard</button>

    <div class="auth-footer">
      <a href="login.html">← Back to Customer Login</a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  if (Auth.isAdminLoggedIn()) window.location.href = 'admin.html';

  document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') adminLogin(); });

  async function adminLogin() {
    const btn = document.getElementById('loginBtn');
    btn.disabled=true;
    btn.innerHTML='<span class="spinner"></span> Verifying…';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username||!password) {
      btn.disabled=false; btn.innerHTML='Access Dashboard';
      return showAlert('error','Enter username and password.');
    }

    try {
      const res  = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password}) });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);

      Auth.saveAdmin(json.data);
      showAlert('success', `Welcome, ${json.data.username}! Redirecting…`);
      setTimeout(() => window.location.href = 'admin.html', 900);
    } catch (e) {
      btn.disabled=false; btn.innerHTML='Access Dashboard';
      showAlert('error', e.message);
    }
  }

  function togglePw() {
    const inp = document.getElementById('password');
    const el  = document.querySelector('.pw-toggle');
    if (inp.type==='password') { inp.type='text'; el.textContent='Hide'; }
    else { inp.type='password'; el.textContent='Show'; }
  }

  function showAlert(type, msg) {
    const el = document.getElementById('alert');
    el.className = `alert alert-${type==='error'?'error':'success'} show`;
    el.textContent = msg;
  }
</script>
</body>
</html>
